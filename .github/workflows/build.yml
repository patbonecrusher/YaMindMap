name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos-arm:
    runs-on: macos-14  # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - name: Build
        run: cargo build --release --target aarch64-apple-darwin
      - name: Bundle app
        run: |
          APP_DIR="YaMindMap.app"
          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources"
          cp target/aarch64-apple-darwin/release/yamindmap "$APP_DIR/Contents/MacOS/"
          cp assets/icons/yamindmap.icns "$APP_DIR/Contents/Resources/"
          cat > "$APP_DIR/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key><string>YaMindMap</string>
              <key>CFBundleDisplayName</key><string>YaMindMap</string>
              <key>CFBundleIdentifier</key><string>com.yamindmap.app</string>
              <key>CFBundleVersion</key><string>0.1.0</string>
              <key>CFBundleShortVersionString</key><string>0.1.0</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleExecutable</key><string>yamindmap</string>
              <key>CFBundleIconFile</key><string>yamindmap</string>
              <key>CFBundleIconName</key><string>yamindmap</string>
              <key>NSHighResolutionCapable</key><true/>
              <key>LSMinimumSystemVersion</key><string>11.0</string>
              <key>NSSupportsAutomaticGraphicsSwitching</key><true/>
          </dict>
          </plist>
          PLIST
          tar czf YaMindMap-macos-arm64.tar.gz YaMindMap.app
      - uses: actions/upload-artifact@v4
        with:
          name: YaMindMap-macos-arm64
          path: YaMindMap-macos-arm64.tar.gz

  build-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc
      - name: Package
        run: |
          mkdir dist
          copy target\x86_64-pc-windows-msvc\release\yamindmap.exe dist\
          cd dist && tar -a -cf ..\YaMindMap-windows-x64.zip yamindmap.exe
        shell: cmd
      - uses: actions/upload-artifact@v4
        with:
          name: YaMindMap-windows-x64
          path: YaMindMap-windows-x64.zip

  build-windows-arm:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc
      - name: Build
        run: cargo build --release --target aarch64-pc-windows-msvc
      - name: Package
        run: |
          mkdir dist
          copy target\aarch64-pc-windows-msvc\release\yamindmap.exe dist\
          cd dist && tar -a -cf ..\YaMindMap-windows-arm64.zip yamindmap.exe
        shell: cmd
      - uses: actions/upload-artifact@v4
        with:
          name: YaMindMap-windows-arm64
          path: YaMindMap-windows-arm64.zip

  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libwayland-dev libxkbcommon-dev libvulkan-dev
      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu
      - name: Package
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/yamindmap dist/
          cp assets/icons/yamindmap_256.png dist/yamindmap.png
          tar czf YaMindMap-linux-x64.tar.gz -C dist .
      - uses: actions/upload-artifact@v4
        with:
          name: YaMindMap-linux-x64
          path: YaMindMap-linux-x64.tar.gz

  build-linux-arm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libvulkan-dev
      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target aarch64-unknown-linux-gnu
      - name: Package
        run: |
          mkdir -p dist
          cp target/aarch64-unknown-linux-gnu/release/yamindmap dist/
          cp assets/icons/yamindmap_256.png dist/yamindmap.png
          tar czf YaMindMap-linux-arm64.tar.gz -C dist .
      - uses: actions/upload-artifact@v4
        with:
          name: YaMindMap-linux-arm64
          path: YaMindMap-linux-arm64.tar.gz

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos-arm, build-windows-x64, build-windows-arm, build-linux-x64, build-linux-arm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            YaMindMap-macos-arm64/YaMindMap-macos-arm64.tar.gz
            YaMindMap-windows-x64/YaMindMap-windows-x64.zip
            YaMindMap-windows-arm64/YaMindMap-windows-arm64.zip
            YaMindMap-linux-x64/YaMindMap-linux-x64.tar.gz
            YaMindMap-linux-arm64/YaMindMap-linux-arm64.tar.gz
